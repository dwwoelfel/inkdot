<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke="#888" stroke-linecap="round" stroke-linejoin="round">

  <!-- SKY: bold wavy lines -->
  <g stroke-width="4" opacity="0.3">
    <path d="M0 22 Q200 5 400 35 Q600 60 800 20"/>
    <path d="M0 52 Q200 35 400 62 Q600 88 800 50"/>
    <path d="M0 80 Q200 65 400 90 Q600 115 800 78"/>
    <path d="M0 108 Q200 92 400 116 Q600 140 800 106"/>
    <path d="M0 134 Q200 120 400 140 Q600 162 800 132"/>
    <path d="M0 160 Q200 146 400 164 Q600 182 800 158"/>
  </g>

  <!-- HORIZON -->
  <path d="M0 195 Q400 185 800 195" stroke-width="2" opacity="0.25"/>

  <!-- RIVER/WATER -->
  <g stroke-width="2.5" opacity="0.22">
    <path d="M200 218 Q350 210 500 225 Q620 236 720 222"/>
    <path d="M190 244 Q340 236 490 250 Q610 260 710 248"/>
    <path d="M185 270 Q335 262 485 276 Q605 284 705 272"/>
    <path d="M180 296 Q330 288 480 302 Q600 310 700 298"/>
    <path d="M178 322 Q328 314 478 328 Q598 336 698 324"/>
  </g>

  <!-- DARK HILL on right -->
  <path d="M530 200 Q620 190 700 240 Q760 300 790 400 Q800 480 800 600"
        stroke-width="5" opacity="0.35" fill="#888" fill-opacity="0.08"/>
  <g stroke-width="3" opacity="0.22">
    <path d="M558 220 Q640 212 718 262 Q770 322 795 425"/>
    <path d="M585 242 Q660 234 730 282 Q778 342 800 448"/>
  </g>

  <!-- ============= BRIDGE ============= -->

  <!-- LEFT RAILING -->
  <path d="M35 600 L158 175" stroke-width="7"/>
  <path d="M98 600 L198 180" stroke-width="4"/>
  <g stroke-width="3" opacity="0.55">
    <line x1="160" y1="188" x2="202" y2="192"/>
    <line x1="150" y1="252" x2="196" y2="256"/>
    <line x1="138" y1="320" x2="184" y2="324"/>
    <line x1="124" y1="392" x2="170" y2="396"/>
    <line x1="106" y1="468" x2="154" y2="472"/>
    <line x1="86" y1="546" x2="134" y2="548"/>
  </g>

  <!-- RIGHT RAILING -->
  <path d="M565 600 L440 188" stroke-width="6"/>
  <path d="M520 600 L418 193" stroke-width="4"/>
  <g stroke-width="3" opacity="0.55">
    <line x1="420" y1="197" x2="443" y2="193"/>
    <line x1="428" y1="260" x2="450" y2="256"/>
    <line x1="438" y1="326" x2="458" y2="322"/>
    <line x1="450" y1="396" x2="468" y2="392"/>
    <line x1="464" y1="470" x2="480" y2="466"/>
    <line x1="482" y1="548" x2="496" y2="544"/>
  </g>

  <!-- Bridge deck planks -->
  <g stroke-width="2" opacity="0.18">
    <line x1="96" y1="575" x2="558" y2="575"/>
    <line x1="94" y1="538" x2="546" y2="546"/>
    <line x1="96" y1="498" x2="532" y2="512"/>
    <line x1="102" y1="456" x2="516" y2="476"/>
    <line x1="110" y1="412" x2="498" y2="438"/>
    <line x1="122" y1="366" x2="478" y2="398"/>
    <line x1="138" y1="320" x2="458" y2="358"/>
    <line x1="156" y1="276" x2="440" y2="318"/>
    <line x1="176" y1="234" x2="424" y2="280"/>
  </g>

  <!-- BACKGROUND FIGURES -->
  <g opacity="0.6" stroke-width="2.8">
    <ellipse cx="226" cy="214" rx="9" ry="14" fill="#888" fill-opacity="0.3"/>
    <path d="M226 228 L226 270 M226 248 L216 262 M226 248 L236 262 M226 270 L220 292 M226 270 L232 292"/>
    <ellipse cx="254" cy="218" rx="9" ry="14" fill="#888" fill-opacity="0.3"/>
    <path d="M254 232 L254 274 M254 254 L244 268 M254 254 L264 268 M254 274 L248 296 M254 274 L260 296"/>
  </g>

  <!-- ============= MAIN FIGURE ============= -->

  <!-- HEAD - elongated with pinched cheeks (hands squeezing) -->
  <path d="M400 168
           C370 168 348 205 346 250
           C345 268 350 292 354 312
           C358 332 360 352 362 358
           C374 368 386 374 400 374
           C414 374 426 368 438 358
           C440 352 442 332 446 312
           C450 292 455 268 454 250
           C452 205 430 168 400 168 Z"
        fill="#888" fill-opacity="0.1" stroke-width="2.8"/>

  <!-- BODY - human silhouette with shoulders, not a triangle -->
  <!-- Shoulder line -->
  <path d="M355 370 Q400 376 445 370" stroke-width="2.5" opacity="0.3"/>
  <!-- Body edges curving outward -->
  <path d="M355 370 C342 385 315 435 302 490 C292 535 286 575 282 600" stroke-width="3.5"/>
  <path d="M445 370 C458 385 485 435 498 490 C508 535 514 575 518 600" stroke-width="3.5"/>
  <!-- Body fill -->
  <path d="M355 370 C342 385 315 435 302 490 C292 535 286 575 282 600
           L518 600 C514 575 508 535 498 490 C485 435 458 385 445 370 Z"
        fill="#888" fill-opacity="0.2" stroke="none"/>
  <!-- Body wavy lines -->
  <g stroke-width="2" opacity="0.2">
    <path d="M350 410 Q400 402 450 410"/>
    <path d="M336 450 Q400 440 464 450"/>
    <path d="M318 495 Q400 484 482 495"/>
    <path d="M300 542 Q400 530 500 542"/>
    <path d="M286 582 Q400 570 514 582"/>
  </g>

  <!-- LEFT ARM: shoulder → elbow (far out left) → hand on CHEEK -->
  <path d="M355 370 C310 345 260 310 255 280 C250 248 305 270 350 285"
        stroke-width="6"/>
  <!-- Left palm emphasis -->
  <path d="M318 274 C332 280 342 283 350 285" stroke-width="12" opacity="0.1"/>
  <!-- Fingers on left cheek -->
  <path d="M348 272 C347 286 347 300 348 312" stroke-width="2.5" opacity="0.4"/>
  <path d="M343 276 C342 290 342 304 343 314" stroke-width="2" opacity="0.35"/>

  <!-- RIGHT ARM: shoulder → elbow (far out right) → hand on CHEEK -->
  <path d="M445 370 C490 345 540 310 545 280 C550 248 495 270 450 285"
        stroke-width="6"/>
  <!-- Right palm emphasis -->
  <path d="M482 274 C468 280 458 283 450 285" stroke-width="12" opacity="0.1"/>
  <!-- Fingers on right cheek -->
  <path d="M452 272 C453 286 453 300 452 312" stroke-width="2.5" opacity="0.4"/>
  <path d="M457 276 C458 290 458 304 457 314" stroke-width="2" opacity="0.35"/>

  <!-- FACE FEATURES -->
  <!-- Worried eyebrows -->
  <path d="M374 236 Q384 228 394 236" stroke-width="2.5" opacity="0.45"/>
  <path d="M406 236 Q416 228 426 236" stroke-width="2.5" opacity="0.45"/>
  <!-- Eyes -->
  <ellipse cx="384" cy="250" rx="9" ry="11" fill="#888" fill-opacity="0.3" stroke-width="2"/>
  <ellipse cx="416" cy="250" rx="9" ry="11" fill="#888" fill-opacity="0.3" stroke-width="2"/>
  <circle cx="384" cy="251" r="4.5" fill="#888" fill-opacity="0.55" stroke="none"/>
  <circle cx="416" cy="251" r="4.5" fill="#888" fill-opacity="0.55" stroke="none"/>

  <!-- Face contour lines (distortion) -->
  <g stroke-width="1.5" opacity="0.12">
    <path d="M352 268 Q400 263 448 268"/>
    <path d="M354 296 Q400 291 446 296"/>
  </g>

  <!-- Nostrils -->
  <circle cx="396" cy="300" r="3" fill="#888" fill-opacity="0.3"/>
  <circle cx="404" cy="300" r="3" fill="#888" fill-opacity="0.3"/>

  <!-- MOUTH - large screaming oval -->
  <ellipse cx="400" cy="338" rx="20" ry="34" fill="#888" fill-opacity="0.28" stroke-width="3"/>
  <!-- Mouth interior darkness -->
  <ellipse cx="400" cy="338" rx="12" ry="24" fill="#888" fill-opacity="0.15" stroke="none"/>

  <!-- Landscape curves flowing to dark hill -->
  <g stroke-width="2.5" opacity="0.2">
    <path d="M456 255 Q510 242 565 258 Q628 276 692 256"/>
    <path d="M458 300 C510 288 565 304 630 320"/>
    <path d="M454 348 C510 334 570 350 636 366"/>
  </g>

</svg>
